        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
            example: 8a6e0804-2bd0-4672-b79d-d97027f90720
        - name: memo
          in: query
          required: false
          schema:
            type: string
            example: "Illicit Activities"
        - name: createdAfter
          in: query
          required: false
          schema:
            type: number
            format: unix-timestamp
            example: 1659485172
        - name: createdBefore
          in: query
          required: false
          schema:
            type: number
            format: unix-timestamp
